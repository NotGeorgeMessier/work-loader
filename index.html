<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Embed demo</title>
  <style>
    html, body { margin: 0; min-height: 100%; background: #111; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }
    iframe {
      border: 0;
      width: 32px;
      aspect-ratio: 1;
      border-radius: 50%;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <iframe src="embed.html" title="Video" allow="autoplay; fullscreen"></iframe>
</body>
</html>
