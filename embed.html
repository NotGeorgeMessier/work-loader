<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Video embed</title>
  <style>
    html, body { margin: 0; height: 100%; background: #000; cursor: pointer; }
    video { width: 100%; height: 100%; object-fit: cover; display: block; }
  </style>
</head>
<body>
  <video id="v" src="sony.mp4" playsinline preload="metadata"></video>
  <script>
    var el = document.getElementById('v');
    document.body.addEventListener('pointerdown', function () {
      if (el.ended) {
        el.currentTime = 0;
        el.play();
        return;
      }
      if (el.paused) el.play();
      else el.pause();
    });
  </script>
</body>
</html>
